<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="깔끔하고 현대적인 디자인의 프리미엄 투두리스트 웹 앱 - TaskFlow">
  <title>TaskFlow - 오늘 할 일</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Animated Background Elements -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="app-container">
    <main class="todo-card">
      <!-- App Header -->
      <header class="todo-header">
        <div class="header-top">
          <div class="brand">
            <div class="brand-logo">
              <i data-lucide="check-square" class="logo-icon"></i>
            </div>
            <div>
              <h1>TaskFlow</h1>
              <p class="date-string" id="current-date">June 26, 2026</p>
            </div>
          </div>
          <div class="theme-toggle" id="theme-btn" title="테마 변경">
            <i data-lucide="sun" id="theme-icon"></i>
          </div>
        </div>

        <!-- Progress Overview -->
        <div class="progress-container">
          <div class="progress-info">
            <span class="progress-label">오늘의 달성도</span>
            <span class="progress-stats" id="progress-text">0 / 0 완료</span>
          </div>
          <div class="progress-bar-wrapper">
            <div class="progress-bar-fill" id="progress-bar"></div>
          </div>
        </div>
      </header>

      <!-- Input Form -->
      <form class="todo-form" id="todo-form">
        <div class="input-wrapper">
          <i data-lucide="plus-circle" class="input-icon"></i>
          <input 
            type="text" 
            id="todo-input" 
            placeholder="할 일을 입력하고 Enter를 누르거나 추가하세요..." 
            autocomplete="off"
            required
            maxlength="100"
          >
          <button type="submit" class="submit-btn" aria-label="할 일 추가">
            <i data-lucide="arrow-right"></i>
          </button>
        </div>
      </form>

      <!-- Filter Controls -->
      <section class="todo-filters">
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">전체</button>
          <button class="filter-tab" data-filter="active">진행 중</button>
          <button class="filter-tab" data-filter="completed">완료됨</button>
          <div class="tab-indicator" id="tab-indicator"></div>
        </div>
      </section>

      <!-- Tasks List -->
      <section class="todo-list-section">
        <ul class="todo-list" id="todo-list">
          <!-- Tasks will be dynamically generated by JS -->
        </ul>
        
        <!-- Empty State -->
        <div class="empty-state" id="empty-state">
          <div class="empty-icon-wrapper">
            <i data-lucide="inbox" class="empty-icon"></i>
          </div>
          <h3>할 일이 없습니다</h3>
          <p>새로운 할 일을 추가하고 오늘 하루를 알차게 시작해 보세요!</p>
        </div>
      </section>

      <!-- Footer Stats -->
      <footer class="todo-footer">
        <span class="items-left" id="items-left">0개의 할 일 남음</span>
        <button class="clear-completed-btn" id="clear-completed-btn">
          <i data-lucide="trash-2" class="btn-icon"></i>
          완료된 항목 삭제
        </button>
      </footer>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
